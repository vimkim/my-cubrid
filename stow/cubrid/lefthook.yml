pre-commit:
  commands:
    codestyle:
      glob: "*.{c,h,cpp,hpp,i,ipp}"
      run: |
        for f in {staged_files}; do
          .github/workflows/codestyle.sh "$f"
        done
        if ! git diff --quiet -- {staged_files}; then
          echo "Code style violations detected. Files were auto-formatted by .github/workflows/codestyle.sh." >&2
          echo "Re-stage and commit again:" >&2
          git --no-pager diff --stat -- {staged_files} >&2
          exit 1
        fi

pre-push:
  commands:
    pr-base-freshness:
      run: |
        if [ "${CUBRID_SKIP_PR_BASE_CHECK:-0}" = "1" ]; then
          echo "Skipping PR base freshness check because CUBRID_SKIP_PR_BASE_CHECK=1." >&2
          exit 0
        fi

        current_branch="$(git branch --show-current)"

        # Resolve the freshness base in priority order:
        #   1. explicit environment override
        #   2. branch-local git config
        #   3. best-effort GitHub PR metadata (if gh is available)
        #   4. fallback to origin/develop
        base_remote="${CUBRID_PR_BASE_REMOTE:-}"
        base_branch="${CUBRID_PR_BASE:-}"

        if [ -z "$base_remote" ]; then
          base_remote="$(git config --get "branch.${current_branch}.cubrid-pr-base-remote" || true)"
        fi

        if [ -z "$base_branch" ]; then
          base_branch="$(git config --get "branch.${current_branch}.cubrid-pr-base-branch" || true)"
        fi

        if [ -z "$base_branch" ] && command -v gh >/dev/null 2>&1; then
          # `gh pr list --head "$current_branch"` matches fork-backed PRs in the
          # CUBRID/CUBRID base repository; the owner-qualified form did not.
          base_branch="$(
            gh pr list --repo CUBRID/CUBRID \
              --head "$current_branch" \
              --state open \
              --json baseRefName \
              --jq '.[0].baseRefName // empty' 2>/dev/null || true
          )"
          if [ -n "$base_branch" ] && [ -z "$base_remote" ]; then
            base_remote="origin"
          fi
        fi

        base_remote="${base_remote:-origin}"
        base_branch="${base_branch:-develop}"

        echo "Checking that HEAD contains latest ${base_remote}/${base_branch}..." >&2
        git fetch --no-tags "$base_remote" "$base_branch"

        if ! git merge-base --is-ancestor FETCH_HEAD HEAD; then
          echo "Current branch is stale against ${base_remote}/${base_branch}." >&2
          echo "Update it before pushing PR changes:" >&2
          echo "  git rebase FETCH_HEAD && git push --force-with-lease" >&2
          echo "or:" >&2
          echo "  git merge FETCH_HEAD && git push" >&2
          exit 1
        fi
